<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Alice Bonini</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="header">
  <button id="adminGear" class="gear" aria-label="Admin">⚙</button>
  <h1>Alice Bonini</h1>
</header>

<main>
  <section id="adminPanel" class="admin-panel hidden">
    <div class="admin-top">
      <h2>Admin</h2>
      <div class="admin-top-actions">
        <button id="openUpload" class="plus-button" aria-label="Lägg upp ny vara">+</button>
        <button id="logoutAdmin" class="small-button">Logga ut</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div id="statAvailable" class="stat-number">0</div>
        <div id="statAvailableValue" class="stat-label">tot. 0 kr</div>
      </div>
      <div class="stat-card">
        <div id="statHandle" class="stat-number">0</div>
        <div id="statHandleValue" class="stat-label">tot. 0 kr</div>
      </div>
      <div class="stat-card">
        <div id="statHistory" class="stat-number">0</div>
        <div id="statHistoryValue" class="stat-label">tot. 0 kr</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter" data-filter="available">Till salu</button>
      <button class="filter active" data-filter="reserved">Hantera</button>
      <button class="filter" data-filter="delivered">Historik</button>
    </div>

    <div id="adminList" class="admin-list"></div>
  </section>

  <section id="gallery" class="gallery"></section>
</main>

<div id="pinModal" class="overlay hidden">
  <div class="popup">
    <button id="closePin" class="close">×</button>
    <h2>Admin</h2>
    <input id="pinInput" type="password" placeholder="PIN-kod" />
    <button id="pinSubmit">Öppna admin</button>
    <p id="pinError" class="error"></p>
  </div>
</div>

<div id="uploadModal" class="overlay hidden">
  <div class="popup">
    <button id="closeUpload" class="close">×</button>
    <h2>Lägg upp vara</h2>
    <input id="itemImage" type="file" accept="image/*" />
    <input id="itemSize" type="text" placeholder="Storlek, t.ex. 152 / S / M" />
    <input id="itemPrice" type="text" placeholder="Pris, t.ex. 80" />
    <button id="uploadItem">Publicera</button>
    <p id="uploadStatus"></p>
  </div>
</div>

<div id="editModal" class="overlay hidden">
  <div class="popup">
    <button id="closeEdit" class="close">×</button>
    <h2>Ändra vara</h2>
    <input id="editSize" type="text" placeholder="Storlek" />
    <input id="editPrice" type="text" placeholder="Pris" />
    <button id="saveEdit">Spara ändring</button>
    <p id="editStatus"></p>
  </div>
</div>

<div id="productModal" class="overlay hidden">
  <div class="product-modal">
    <button id="closeProduct" class="close">×</button>
    <button id="prevItem" class="nav left">‹</button>
    <button id="nextItem" class="nav right">›</button>
    <img id="modalImage" src="" alt="" />
    <div class="product-info">
      <h2 id="modalPrice"></h2>
      <p id="modalSize"></p>
      <button id="buyButton">Köp / reservera</button>
    </div>
  </div>
</div>

<div id="buyModal" class="overlay hidden">
  <div class="popup">
    <button id="closeBuy" class="close">×</button>
    <h2>Köp / reservera</h2>
    <input id="buyerName" type="text" placeholder="Ditt namn" />
    <textarea id="buyerMessage" placeholder="Meddelande, frivilligt"></textarea>
    <button id="sendBuy">Skicka köpintresse</button>
    <p id="buyStatus"></p>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script type="module" src="app.js"></script>
</body>
</html>
